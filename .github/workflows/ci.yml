name: CI
on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (kqueue event loop)
          - name: macos-release
            os: macos-latest
            cmake_flags: -DCMAKE_BUILD_TYPE=Release
          - name: macos-asan-ubsan
            os: macos-latest
            cmake_flags: -DCMAKE_BUILD_TYPE=Debug -DSANITIZE_ADDRESS=ON
          - name: macos-tsan
            os: macos-latest
            cmake_flags: -DCMAKE_BUILD_TYPE=Debug -DSANITIZE_THREAD=ON
          # Linux (epoll event loop), built with Clang to match the primary
          # Apple Clang toolchain under -Wconversion -Werror.
          - name: linux-release
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            cmake_flags: -DCMAKE_BUILD_TYPE=Release
          - name: linux-asan-ubsan
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            cmake_flags: -DCMAKE_BUILD_TYPE=Debug -DSANITIZE_ADDRESS=ON
          - name: linux-tsan
            os: ubuntu-latest
            cc: clang
            cxx: clang++
            cmake_flags: -DCMAKE_BUILD_TYPE=Debug -DSANITIZE_THREAD=ON
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt') }}
      - name: Configure
        run: cmake -B build ${{ matrix.cmake_flags }}
      - name: Build
        run: cmake --build build -j 3
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120
